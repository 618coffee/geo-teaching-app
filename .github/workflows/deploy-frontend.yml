name: Deploy Frontend to ECS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package dist
        working-directory: frontend
        run: tar -czf dist.tar.gz -C dist .

      - name: Upload to ECS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          password: ${{ secrets.ECS_PASSWORD }}
          source: frontend/dist.tar.gz
          target: /tmp/
          strip_components: 1

      - name: Extract and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            set -e
            echo ">>> 解压前端文件..."
            tar -xzf /tmp/dist.tar.gz -C /var/www/geo-teaching-app
            rm /tmp/dist.tar.gz
            echo ">>> 重载 Nginx..."
            nginx -t && systemctl reload nginx
            echo ">>> 部署完成！"
            echo "访问地址：http://${{ secrets.ECS_HOST }}"
