spring:
  application:
    name: geo-teaching-app-server
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

server:
  port: ${PORT:4000}

app:
  auth:
    jwt-secret: ${JWT_SECRET:replace-this-in-production}
    access-token-expires-in-hours: ${ACCESS_TOKEN_EXPIRES_IN_HOURS:2}
    data-file-path: ${AUTH_DATA_FILE_PATH:./data/dev-auth-store.json}
    cors-origins:
      - ${CORS_ORIGIN_1:http://localhost:5173}
      - ${CORS_ORIGIN_2:http://127.0.0.1:5173}

---
# Default profile: H2 in-memory (for local dev without MySQL)
spring:
  config:
    activate:
      on-profile: "!mysql"
  datasource:
    url: jdbc:h2:mem:devdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

---
# MySQL profile: used in Docker / ECS production
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/geo_teaching?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${MYSQL_USER:geo_teaching}
    password: ${MYSQL_PASSWORD:geo_teaching_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect