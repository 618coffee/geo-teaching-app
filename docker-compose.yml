services:
  mysql:
    image: mysql:8.0
    container_name: geo-teaching-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_change_me
      MYSQL_DATABASE: geo_teaching
      MYSQL_USER: geo_teaching
      MYSQL_PASSWORD: geo_teaching_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: geo-teaching-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_URL: jdbc:mysql://mysql:3306/geo_teaching?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
      MYSQL_USER: geo_teaching
      MYSQL_PASSWORD: geo_teaching_pass
      JWT_SECRET: ${JWT_SECRET:-replace-this-in-production}
      CORS_ORIGIN_1: ${CORS_ORIGIN_1:-http://localhost:5173}
      CORS_ORIGIN_2: ${CORS_ORIGIN_2:-http://127.0.0.1:5173}
    ports:
      - "4000:4000"

volumes:
  mysql-data:
